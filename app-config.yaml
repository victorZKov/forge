app:
  title: Forge — AI-Native IDP
  baseUrl: http://localhost:3000

organization:
  name: victorz.cloud

backend:
  auth:
    keys:
      - secret: ${BACKEND_SECRET}
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

auth:
  environment: development
  session:
    secret: ${BACKEND_SECRET}
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: false
    oidc:
      development:
        metadataUrl: ${OIDC_METADATA_URL}    # e.g. https://auth.quantumapi.eu/.well-known/openid-configuration
        clientId: ${OIDC_CLIENT_ID}
        clientSecret: ${OIDC_CLIENT_SECRET}
        prompt: consent
        additionalScopes:
          - profile
          - email

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}  # Personal access token with repo scope

catalogEnricher:
  aiServiceUrl: http://localhost:5100
  githubToken: ${GITHUB_TOKEN}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration

  rules:
    - allow: [Component, System, API, Resource, Location, Template, Group, User]

  locations:
    # Local catalog entities
    - type: file
      target: ../../catalog/all.yaml

    # Templates
    - type: file
      target: ../../templates/dotnet-api/template.yaml
      rules:
        - allow: [Template]
