services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:20
    volumes:
      - ..:/workspaces/forge:cached
    command: sleep infinity
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_dev_password
      POSTGRES_DB: forge
      OIDC_METADATA_URL: https://id.quantumapi.eu/.well-known/openid-configuration
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-demo}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-demo}

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_dev_password
      POSTGRES_DB: forge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
